<body>

                            <div class="city-divider">|</div>

    <!-- 用户信息管理内容 -->
    <section class="user-info-management">
        <div class="container">
            <h2 class="section-title">用户信息管理</h2>
            
            <div class="user-info-container">
                <!-- 搜索和筛选 -->
                <div class="user-info-search">
                    <div class="search-group">
                            <label for="userInfoSearch">用户搜索：</label>
                            <input type="text" id="userInfoSearch" placeholder="输入用户ID或姓名">
                            <button class="search-btn">搜索</button>
                        </div>
                    <div class="filter-group">
                        <label for="userStatusFilter">用户状态：</label>
                        <select id="userStatusFilter">
                            <option value="">全部状态</option>
                            <option value="active">活跃</option>
                            <option value="inactive">不活跃</option>
                        </select>
                    </div>
                </div>
                
                <!-- 用户信息列表 -->
                <div class="user-info-list">
                    <table class="user-info-table">
                        <thead>
                            <tr>
                                <th>用户ID</th>
                                <th>用户名</th>
                                <th>姓名</th>
                                <th>性别</th>
                                <th>联系电话</th>
                                <th>注册日期</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                        </tbody>
                    </table>
                </div>
                
                <!-- 分页 -->
                <div class="pagination">
                    <button class="page-btn" disabled>上一页</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn">4</button>
                    <button class="page-btn">5</button>
                    <button class="page-btn">下一页</button>
                    <span class="page-info">共 120 条记录，每页 8 条，共 15 页</span>
                </div>
            </div>
        </div>
    </section>

    <!-- 查看/编辑用户信息弹窗 -->
    <div class="modal" id="userInfoModal">
        <div class="modal-content">
            <span class="modal-close" id="userInfoModalClose">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle">用户信息详情</h2>
            </div>
            <div class="modal-body">
                <form id="userInfoForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="infoUserId">用户ID</label>
                            <input type="text" id="infoUserId" readonly>
                        </div>
                        <div class="form-group">
                            <label for="infoUsername">用户名</label>
                            <input type="text" id="infoUsername" readonly>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="infoName">姓名</label>
                            <input type="text" id="infoName" required>
                        </div>
                        <div class="form-group">
                            <label for="infoSex">性别</label>
                            <select id="infoSex" required>
                                <option value="男">男</option>
                                <option value="女">女</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="infoPhone">联系电话</label>
                            <input type="tel" id="infoPhone" placeholder="请输入联系电话" required>
                        </div>
                        <div class="form-group">
                            <label for="infoRegisterDate">注册日期</label>
                            <input type="date" id="infoRegisterDate" readonly>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label for="infoStatus">状态</label>
                            <select id="infoStatus" required>
                                <option value="active">活跃</option>
                                <option value="inactive">不活跃</option>
                            </select>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="submit" form="userInfoForm" class="modal-btn login-modal-btn" id="saveUserInfoBtn">保存</button>
                <button type="button" class="modal-btn register-modal-btn" id="cancelUserInfoBtn">取消</button>
            </div>
        </div>
    </div>

    <script src="../JS/jquery-3.4.1.min.js"></script>

    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 获取DOM元素
            const searchInput = document.getElementById('userInfoSearch');
            const searchBtn = document.querySelector('.search-btn');
            const statusFilter = document.getElementById('userStatusFilter');
            const tableBody = document.querySelector('.user-info-table tbody');
            
            // 分页相关变量
            let currentPage = 1;
            let pageSize = 10;
            let allUsers = [];
            let filteredUsers = [];
            
            // 页面加载时获取所有用户数据
            loadAllUsers();
            
            // 绑定搜索事件
            searchBtn.addEventListener('click', performSearch);
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
            
            // 绑定状态筛选事件
            statusFilter.addEventListener('change', function() {
                performSearch();
            });
            
            // 绑定分页按钮点击事件
            document.addEventListener('click', function(e) {
                if (e.target.classList.contains('page-btn')) {
                    const text = e.target.textContent;
                    
                    if (text === '上一页') {
                        if (currentPage > 1) {
                            currentPage--;
                            renderPagination();
                        }
                    } else if (text === '下一页') {
                        if (currentPage < Math.ceil(filteredUsers.length / pageSize)) {
                            currentPage++;
                            renderPagination();
                        }
                    } else if (!isNaN(parseInt(text))) {
                        currentPage = parseInt(text);
                        renderPagination();
                    }
                }
            });
            
            // 加载所有用户数据
            function loadAllUsers() {
                // 显示加载状态
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">正在加载用户数据...</td></tr>';
                
                // 使用jQuery的ajax来处理API调用，可能比fetch更兼容
                $.ajax({
                    url: 'http://localhost:8080/EventPlanning_Management/ShowAllUser',
                    type: 'GET',
                    dataType: 'json',
                    success: function(data) {
                        console.log('API返回数据:', data);
                        
                        // 处理返回数据 - 更宽松的数据检查
                        if (data) {
                            // 检查flag字段，支持不同的成功值
                            const isSuccess = data.flag === 'success' || data.flag === 'ok' || data.flag === true;
                            
                            // 检查data字段，支持不同的数据结构
                            let userData = [];
                            if (isSuccess && data.data) {
                                if (Array.isArray(data.data)) {
                                    userData = data.data;
                                } else if (typeof data.data === 'object') {
                                    // 如果data是对象而不是数组，尝试将其转换为数组
                                    userData = [data.data];
                                }
                            }
                            
                            // 筛选roleId=2的用户，支持字符串和数字类型
                            allUsers = userData.filter(user => {
                                return user && (user.roleId === 2 || user.roleId === '2');
                            });
                            
                            filteredUsers = allUsers;
                            currentPage = 1;
                            renderPagination();
                        } else {
                            // 无数据
                            tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">暂无用户数据</td></tr>';
                            updatePagination(0);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('加载用户数据失败:', error);
                        tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px; color: red;">加载用户数据失败：' + error + '</td></tr>';
                        updatePagination(0);
                    }
                });
            }
            
            // 渲染分页
            function renderPagination() {
                var totalPages = Math.ceil(filteredUsers.length / pageSize);
                var startPage = Math.max(1, currentPage - 2);
                var endPage = Math.min(totalPages, startPage + 4);
                
                // 渲染用户列表
                var startIndex = (currentPage - 1) * pageSize;
                var endIndex = startIndex + pageSize;
                var pageUsers = filteredUsers.slice(startIndex, endIndex);
                renderUsers(pageUsers);
                
                // 更新分页信息
                updatePagination(filteredUsers.length, totalPages, startPage, endPage);
            }
            
            // 渲染用户列表
            function renderUsers(users) {
                // 清空表格内容
                tableBody.innerHTML = '';
                
                if (users.length === 0) {
                    tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">未找到匹配的用户信息</td></tr>';
                    return;
                }
                
                // 渲染用户数据
                users.forEach((user, index) => {
                    const row = document.createElement('tr');
                    const status = user.status === 1 ? '活跃' : '不活跃';
                    const statusClass = user.status === 1 ? 'active' : 'inactive';
                    const actionBtn = user.status === 1 
                        ? '<button class="disable-user-btn">禁用</button>' 
                        : '<button class="enable-user-btn">启用</button>';
                    
                    row.innerHTML = `
                        <td>${user.userId || 'U' + (index + 1)}</td>
                        <td>${user.username || ''}</td>
                        <td>${user.name || ''}</td>
                        <td>${user.sex || ''}</td>
                        <td>${user.phone || ''}</td>
                        <td>${user.start_day || ''}</td>
                        <td><span class="status ${statusClass}">${status}</span></td>
                        <td>
                            <button class="edit-info-btn">编辑</button>
                            ${actionBtn}
                        </td>
                    `;
                    
                    tableBody.appendChild(row);
                });
                
                // 重新绑定事件
                bindAllEvents();
            }
            
            // 执行搜索
            function performSearch() {
                const keyword = searchInput.value.trim();
                const status = statusFilter.value;
                
                // 显示加载状态
                tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px;">正在搜索用户数据...</td></tr>';
                
                // 判断搜索类型：数字为userId搜索，其他为姓名搜索
                let apiUrl;
                let useLocalData = false;
                
                if (!keyword) {
                    // 无关键字，使用原有的全量数据
                    useLocalData = true;
                } else if (/^\d+$/.test(keyword)) {
                    // 纯数字，使用userId搜索API
                    apiUrl = `http://localhost:8080/EventPlanning_Management/SearchUserById?userId=${encodeURIComponent(keyword)}`;
                } else {
                    // 非数字，使用姓名搜索API
                    apiUrl = `http://localhost:8080/EventPlanning_Management/SearchUserByRealName?name=${encodeURIComponent(keyword)}`;
                }
                
                if (useLocalData) {
                    // 使用本地数据进行筛选
                    filterUsers(allUsers);
                } else {
                    // 使用jQuery的ajax来处理搜索API调用
                    $.ajax({
                        url: apiUrl,
                        type: 'GET',
                        dataType: 'json',
                        success: function(data) {
                            console.log('搜索API返回数据:', data);
                            let searchResults = [];
                            
                            // 处理返回数据 - 更宽松的数据检查
                            if (data) {
                                // 检查flag字段，支持不同的成功值
                                const isSuccess = data.flag === 'success' || data.flag === 'ok' || data.flag === true;
                                
                                // 检查data字段，支持不同的数据结构
                                if (isSuccess && data.data) {
                                    if (Array.isArray(data.data)) {
                                        searchResults = data.data;
                                    } else if (typeof data.data === 'object') {
                                        // 如果data是对象而不是数组，尝试将其转换为数组
                                        searchResults = [data.data];
                                    }
                                }
                            }
                            
                            // 筛选roleId=2的用户，支持字符串和数字类型
                            const filteredResults = searchResults.filter(user => {
                                return user && (user.roleId === 2 || user.roleId === '2');
                            });
                            
                            // 应用状态筛选
                            filterUsers(filteredResults);
                        },
                        error: function(xhr, status, error) {
                            console.error('搜索用户数据失败:', error);
                            tableBody.innerHTML = '<tr><td colspan="8" style="text-align: center; padding: 20px; color: red;">搜索用户数据失败：' + error + '</td></tr>';
                            updatePagination(0);
                        }
                    });
                }
            }
            
            // 筛选用户
            function filterUsers(users) {
                const status = statusFilter.value;
                
                // 筛选逻辑
                let filteredUsersTemp = [...users];
                
                // 按状态筛选，支持字符串和数字类型
                if (status) {
                    const statusValue = status === 'active' ? 1 : 0;
                    filteredUsersTemp = filteredUsersTemp.filter(user => {
                        return user && (user.status === statusValue || user.status === String(statusValue));
                    });
                }
                
                filteredUsers = filteredUsersTemp;
                currentPage = 1;
                renderPagination();
            }
            
            // 绑定所有事件
            function bindAllEvents() {
                bindEditEvents();
                bindDisableUserEvents();
                bindEnableUserEvents();
            }
            
            // 更新分页信息
            function updatePagination(totalUsers, totalPages, startPage, endPage) {
                // 设置默认值
                startPage = startPage || 1;
                endPage = endPage || Math.min(totalPages, startPage + 4);
                
                // 更新分页信息显示
                const pageInfo = document.querySelector('.page-info');
                if (pageInfo) {
                    pageInfo.textContent = `共 ${totalUsers} 条记录，每页 ${pageSize} 条，共 ${totalPages} 页`;
                }
                
                // 更新分页按钮
                const pagination = document.querySelector('.pagination');
                if (pagination) {
                    // 保存上一页和下一页按钮
                    const prevBtn = pagination.querySelector('.page-btn:first-child');
                    const nextBtn = pagination.querySelector('.page-btn:last-child');
                    
                    // 清空所有按钮
                    pagination.innerHTML = '';
                    
                    // 重新添加上一页按钮
                    if (prevBtn) {
                        pagination.appendChild(prevBtn);
                        prevBtn.disabled = currentPage === 1;
                    }
                    
                    // 生成页码按钮
                    for (let i = startPage; i <= endPage; i++) {
                        const pageBtn = document.createElement('button');
                        pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                        pageBtn.textContent = i;
                        pagination.appendChild(pageBtn);
                    }
                    
                    // 重新添加下一页按钮
                    if (nextBtn) {
                        pagination.appendChild(nextBtn);
                        nextBtn.disabled = currentPage === totalPages || totalPages <= 1;
                    }
                    
                    // 重新添加分页信息
                    if (pageInfo) {
                        pagination.appendChild(pageInfo);
                    }
                }
            }
            
            // 重新绑定编辑事件
            function bindEditEvents() {
                const editBtns = document.querySelectorAll('.edit-info-btn');
                editBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        openUserInfoModal(this, 'edit');
                    });
                });
            }
            
            // 禁用用户按钮点击事件
            function bindDisableUserEvents() {
                const disableUserBtns = document.querySelectorAll('.disable-user-btn');
                disableUserBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        if(confirm('确定要禁用该用户吗？')) {
                            const row = this.closest('tr');
                            const userId = row.querySelector('td:nth-child(1)').textContent;
                            
                            // 调用后端API修改用户状态
                            const apiUrl = `http://localhost:8080/EventPlanning_Management/UpdateUserStatus?userId=${encodeURIComponent(userId)}&status=0`;
                            fetch(apiUrl)
                                .then(response => response.json())
                                .then(data => {
                                    if (data && data.flag === 'success') {
                                        // API调用成功，更新前端状态
                                        const statusSpan = row.querySelector('.status');
                                        statusSpan.textContent = '不活跃';
                                        statusSpan.className = 'status inactive';
                                        const td = this.parentElement;
                                        td.innerHTML = '<button class="edit-info-btn">编辑</button><button class="enable-user-btn">启用</button>';
                                        // 重新绑定事件
                                        bindEnableUserEvents();
                                        bindEditEvents();
                                        alert('用户已成功禁用');
                                    } else {
                                        alert('禁用用户失败：' + (data.msg || data.data || '未知错误'));
                                    }
                                })
                                .catch(error => {
                                    console.error('禁用用户失败:', error);
                                    alert('禁用用户失败，请检查网络连接');
                                });
                        }
                    });
                });
            }
            
            // 启用用户按钮点击事件
            function bindEnableUserEvents() {
                const enableUserBtns = document.querySelectorAll('.enable-user-btn');
                enableUserBtns.forEach(btn => {
                    btn.addEventListener('click', function() {
                        if(confirm('确定要启用该用户吗？')) {
                            const row = this.closest('tr');
                            const userId = row.querySelector('td:nth-child(1)').textContent;
                            
                            // 调用后端API修改用户状态
                            const apiUrl = `http://localhost:8080/EventPlanning_Management/UpdateUserStatus?userId=${encodeURIComponent(userId)}&status=1`;
                            fetch(apiUrl)
                                .then(response => response.json())
                                .then(data => {
                                    if (data && data.flag === 'success') {
                                        // API调用成功，更新前端状态
                                        const statusSpan = row.querySelector('.status');
                                        statusSpan.textContent = '活跃';
                                        statusSpan.className = 'status active';
                                        const td = this.parentElement;
                                        td.innerHTML = '<button class="edit-info-btn">编辑</button><button class="disable-user-btn">禁用</button>';
                                        // 重新绑定事件
                                        bindDisableUserEvents();
                                        bindEditEvents();
                                        alert('用户已成功启用');
                                    } else {
                                        alert('启用用户失败：' + (data.msg || data.data || '未知错误'));
                                    }
                                })
                                .catch(error => {
                                    console.error('启用用户失败:', error);
                                    alert('启用用户失败，请检查网络连接');
                                });
                        }
                    });
                });
            }
            
            // 打开用户信息弹窗
            function openUserInfoModal(btn, mode) {
                const row = btn.closest('tr');
                const tds = row.querySelectorAll('td');
                
                // 填充表单数据
                document.getElementById('infoUserId').value = tds[0].textContent;
                document.getElementById('infoUsername').value = tds[1].textContent;
                document.getElementById('infoName').value = tds[2].textContent;
                document.getElementById('infoSex').value = tds[3].textContent;
                document.getElementById('infoPhone').value = tds[4].textContent;
                document.getElementById('infoRegisterDate').value = tds[5].textContent;
                document.getElementById('infoStatus').value = tds[6].querySelector('.status').textContent === '活跃' ? 'active' : 'inactive';
                
                // 设置模态框标题
                document.getElementById('modalTitle').textContent = '编辑用户信息';
                document.getElementById('saveUserInfoBtn').style.display = 'inline-block';
                
                // 设置表单为可编辑
                const inputs = document.querySelectorAll('#userInfoForm input, #userInfoForm select, #userInfoForm textarea');
                inputs.forEach(input => {
                    if(input.id !== 'infoUserId' && input.id !== 'infoUsername' && input.id !== 'infoRegisterDate') {
                        input.readOnly = false;
                        input.disabled = false;
                    } else {
                        input.readOnly = true;
                        input.disabled = false;
                    }
                });
                
                // 显示弹窗
                document.getElementById('userInfoModal').style.display = 'block';
            }
            
            // 关闭模态框
            document.getElementById('userInfoModalClose').addEventListener('click', function() {
                document.getElementById('userInfoModal').style.display = 'none';
            });
            
            document.getElementById('cancelUserInfoBtn').addEventListener('click', function() {
                document.getElementById('userInfoModal').style.display = 'none';
            });
            
            // 点击模态框外部关闭
            window.addEventListener('click', function(event) {
                if (event.target == document.getElementById('userInfoModal')) {
                    document.getElementById('userInfoModal').style.display = 'none';
                }
            });
            
            // 表单提交
            document.getElementById('userInfoForm').addEventListener('submit', function(e) {
                e.preventDefault();
                if(confirm('确定要保存用户信息吗？')) {
                    alert('用户信息保存成功！');
                    document.getElementById('userInfoModal').style.display = 'none';
                    // 这里可以添加更新列表的逻辑
                }
            });
        });
    </script>
    <script src="../JS/index.js"></script>
</body>
</html>
