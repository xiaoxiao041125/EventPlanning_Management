<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们 - 爱情海文化传媒</title>
    <link rel="stylesheet" href="../CSS/index.css">
    <style>
        /* 隐藏滚动条但保持滚动功能 */
        /* 对于WebKit浏览器 */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* 对于Firefox */
        html {
            scrollbar-width: none;
        }
    </style>
    <link rel="preload" href="../IMG/联系我们.jpg" as="image" type="image/jpeg">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="../IMG/LOGO.jpg" alt="爱情海文化传媒">
                <span class="logo-text">活动策划管理平台</span>
            </div>
            <div class="city-selector">
                <div class="city-current">
                    武汉 <span class="arrow">↓</span>
                </div>
                <div class="city-dropdown">
                    <div class="business-distribution">业务分布</div>
                    <div class="city-grid">
                        <div class="city-row">
                            <div class="city-item">武汉</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">南京</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">杭州</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">苏州</div>
                        </div>
                        <div class="city-row">
                            <div class="city-item">北京</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">广州</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">深圳</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">其他</div>
                        </div>
                    </div>
                </div>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">首页</a></li>
                <li><a href="about.html">关于我们</a></li>
                <li><a href="plan.html">方案制定</a></li>
                <li><a href="#">活动案例</a></li>
                <li><a href="service.html">服务理念</a></li>
                <li><a href="#">加入我们</a></li>
                <li><a href="contact.html" class="active">联系我们</a></li>
            </ul>
            <div class="navbar-user-info" id="navbarUserInfo">
            </div>
            <button class="login-btn" id="headerLoginBtn">登录</button>
            <button class="switch-version-btn" id="switchVersionBtn">切换员工版</button>
        </div>
    </nav>

    <!-- 联系我们内容 -->
    <section class="contact-us">
        <div class="container">
            <h2 class="section-title">联系我们</h2>
            
            <div class="contact-content">
                <!-- 联系信息 -->
                <div class="contact-info">
                    <div class="contact-image">
                        <img src="../IMG/联系我们.jpg" alt="联系我们" loading="lazy" decoding="async">
                    </div>
                    <div class="contact-item">
                        <h3>联系方式</h3>
                        <div class="contact-details">
                            <div class="contact-detail">
                                <span class="detail-label">热线电话：</span>
                                <span class="detail-value">400-123-4567</span>
                            </div>
                            <div class="contact-detail">
                                <span class="detail-label">直连电话：</span>
                                <span class="detail-value">027-88888888</span>
                            </div>
                            <div class="contact-detail">
                                <span class="detail-label">邮箱：</span>
                                <span class="detail-value">for@example.com</span>
                            </div>
                            <div class="contact-detail">
                                <span class="detail-label">微信：</span>
                                <span class="detail-value">love_sea_events</span>
                            </div>
                            <div class="contact-detail">
                                <span class="detail-label">QQ：</span>
                                <span class="detail-value">123456789</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 登录模态框 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <div class="modal-header">
                <h2 id="modalTitle">活动策划管理平台</h2>
            </div>
            
            <!-- 登录表单 -->
            <div class="modal-body" id="loginFormContainer">
                <form id="modalLoginForm">
                    <div class="modal-input-group">
                        <label for="modalUsername">用户名</label>
                        <input type="text" id="modalUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="modal-input-group">
                        <label for="modalPassword">密码</label>
                        <input type="password" id="modalPassword" placeholder="请输入密码" required>
                    </div>
                    <div class="modal-input-group">
                        <label for="loginRole">角色</label>
                        <select id="loginRole" required>
                            <option value="user">普通用户</option>
                            <option value="employee">员工</option>
                        </select>
                    </div>
                </form>
            </div>
            
            <!-- 注册表单 -->
            <div class="modal-body" id="registerFormContainer" style="display: none;">
                <form id="modalRegisterForm">
                    <div class="modal-input-group">
                        <label for="registerUsername">用户名<span class="required">*</span></label>
                        <input type="text" id="registerUsername" placeholder="请输入用户名" required>
                    </div>
                    <div class="modal-input-group">
                        <label for="registerName">姓名</label>
                        <input type="text" id="registerName" placeholder="请输入姓名">
                    </div>
                    <div class="modal-input-group">
                        <label for="registerPhone">电话</label>
                        <input type="tel" id="registerPhone" placeholder="请输入电话号码">
                    </div>
                    <div class="modal-input-group">
                        <label for="registerSex">性别</label>
                        <select id="registerSex">
                            <option value="">请选择性别</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="modal-input-group">
                        <label for="registerRole">角色<span class="required">*</span></label>
                        <select id="registerRole" required>
                            <option value="">请选择角色</option>
                            <option value="user">用户</option>
                            <option value="employee">员工</option>
                        </select>
                    </div>
                    <div class="modal-input-group">
                        <label for="registerPassword">密码<span class="required">*</span></label>
                        <input type="password" id="registerPassword" placeholder="请输入密码" required>
                    </div>
                    <div class="modal-input-group">
                        <label for="registerConfirmPassword">再次输入密码<span class="required">*</span></label>
                        <input type="password" id="registerConfirmPassword" placeholder="请再次输入密码" required>
                        <span class="password-error" style="display: none; color: #ff4d4f; font-size: 12px; margin-top: 5px;">两次输入的密码不一致</span>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer">
                <button type="submit" form="modalLoginForm" class="modal-btn login-modal-btn" id="loginBtn">登录</button>
                <button type="button" class="modal-btn register-modal-btn" id="registerBtn">注册</button>
                <button type="submit" form="modalRegisterForm" class="modal-btn login-modal-btn" id="submitRegisterBtn" style="display: none;">注册</button>
                <button type="button" class="modal-btn register-modal-btn" id="backToLoginBtn" style="display: none;">返回登录</button>
            </div>
        </div>
    </div>

    <!-- 修改密码模态框 -->
    <div class="modal" id="changePasswordModal">
        <div class="modal-content">
            <span class="modal-close" id="changePasswordClose">&times;</span>
            <div class="modal-header">
                <h2>修改密码</h2>
            </div>
            
            <div class="modal-body">
                <form id="changePasswordForm">
                    <div class="modal-input-group">
                        <label for="oldPassword">旧密码</label>
                        <input type="password" id="oldPassword" placeholder="请输入旧密码" required>
                    </div>
                    <div class="modal-input-group">
                        <label for="newPassword">新密码</label>
                        <input type="password" id="newPassword" placeholder="请输入新密码" required>
                    </div>
                    <div class="modal-input-group">
                        <label for="confirmNewPassword">确认新密码</label>
                        <input type="password" id="confirmNewPassword" placeholder="请再次输入新密码" required>
                        <span class="password-error" id="changePasswordError" style="display: none; color: #ff4d4f; font-size: 12px; margin-top: 5px;">两次输入的密码不一致</span>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer">
                <button type="submit" form="changePasswordForm" class="modal-btn login-modal-btn" id="submitChangePasswordBtn">确认修改</button>
                <button type="button" class="modal-btn register-modal-btn" id="cancelChangePasswordBtn">取消</button>
            </div>
        </div>
    </div>

    <!-- 修改信息模态框 -->
    <div class="modal" id="changeInfoModal">
        <div class="modal-content">
            <span class="modal-close" id="changeInfoClose">&times;</span>
            <div class="modal-header">
                <h2>修改信息</h2>
            </div>
            
            <div class="modal-body">
                <form id="changeInfoForm">
                    <div class="modal-input-group">
                        <label>头像</label>
                        <div class="avatar-upload">
                            <img id="currentAvatar" src="../IMG/默认头像webp.webp" alt="当前头像">
                            <input type="file" id="avatarFile" accept="image/*">
                        </div>
                    </div>
                    <div class="modal-input-group">
                        <label for="changeName">姓名</label>
                        <input type="text" id="changeName" placeholder="请输入姓名" required>
                    </div>
                    <div class="modal-input-group">
                        <label for="changeSex">性别</label>
                        <select id="changeSex" required>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="modal-input-group">
                        <label for="changePhone">电话</label>
                        <input type="tel" id="changePhone" placeholder="请输入电话号码" required>
                    </div>
                </form>
            </div>
            
            <div class="modal-footer">
                <button type="submit" form="changeInfoForm" class="modal-btn login-modal-btn" id="submitChangeInfoBtn">确认修改</button>
                <button type="button" class="modal-btn register-modal-btn" id="cancelChangeInfoBtn">取消</button>
            </div>
        </div>
    </div>

    <script src="../JS/jquery-3.4.1.min.js"></script>
    <script src="../JS/login.js"></script>
    <script src="../JS/index.js"></script>
</body>
</html>
