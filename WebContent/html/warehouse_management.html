<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仓库详情 - 爱情海文化传媒</title>
    <link rel="stylesheet" href="../CSS/index.css">
    <style>
        /* 隐藏滚动条但保持滚动功能 */
        /* 对于WebKit浏览器 */
        ::-webkit-scrollbar {
            display: none;
        }
        
        /* 对于Firefox */
        html {
            scrollbar-width: none;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <img src="../IMG/LOGO.jpg" alt="爱情海文化传媒">
                <span class="logo-text">活动策划管理平台</span>
            </div>
            <div class="city-selector">
                <div class="city-current">
                    武汉 <span class="arrow">↓</span>
                </div>
                <div class="city-dropdown">
                    <div class="business-distribution">业务分布</div>
                    <div class="city-grid">
                        <div class="city-row">
                            <div class="city-item">武汉</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">南京</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">杭州</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">苏州</div>
                        </div>
                        <div class="city-row">
                            <div class="city-item">北京</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">广州</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">深圳</div>
                            <div class="city-divider">|</div>
                            <div class="city-item">其他</div>
                        </div>
                    </div>
                </div>
            </div>
            <ul class="nav-menu">
            </ul>
            <div class="navbar-user-info" id="navbarUserInfo">
            </div>
            <button class="login-btn" id="headerLoginBtn">退出登录</button>
            <button class="switch-version-btn" id="switchToUserBtn">切换用户版</button>
        </div>
    </nav>

    <!-- 仓库详情内容 -->
    <section class="warehouse-management-section">
        <div class="container">
            <h2 class="welcome-title" id="welcomeTitle">欢迎回来，仓库管理员！</h2>
            
            <div class="warehouse-container">
                <!-- 搜索栏 -->
                <div class="search-section">
                    <div class="search-form">
                        <div class="form-row">
                            <div class="form-group">
                                <select id="materialCategory">
                                    <option value="">全部类别</option>
                                    <option value="1">音响设备</option>
                                    <option value="2">舞台桁架</option>
                                    <option value="3">舞台配套</option>
                                    <option value="4">庆典道具</option>
                                    <option value="5">灯光设备</option>
                                    <option value="6">桌椅布艺</option>
                                    <option value="7">展示防护</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <select id="materialStatus">
                                    <option value="in-stock">库存中</option>
                                    <option value="outbound">已出库</option>
                                </select>
                            </div>
                            <div class="form-group search-group">
                                <div class="search-input-wrapper">
                                    <input type="text" id="materialSearch" placeholder="请输入物料名称或关键词">
                                    <button class="search-btn">搜索</button>
                                    <button class="reset-btn">重置</button>
                                    <button class="add-material-btn">添加物料</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 物料列表 -->
                <div class="material-list">
                    <div class="table-container">
                        <table class="material-table">
                            <thead>
                                <tr>
                                    <th style="width: 10%;">类别</th>
                                    <th>物料名称</th>
                                    <th style="width: 15%;">物料数量</th>
                                    <th>物料单价</th>
                                    <th>备注</th>
                                    <th style="width: 8%;">操作</th>
                                </tr>
                            </thead>
                            <tbody id="materialTableBody">
                                <!-- 数据将通过API动态加载 -->
                            </tbody>
                        </table>
                    </div>
                </div>
                
                <!-- 分页 -->
                <div class="pagination">
                    <button class="page-btn">上一页</button>
                    <button class="page-btn active">1</button>
                    <button class="page-btn">2</button>
                    <button class="page-btn">3</button>
                    <button class="page-btn">下一页</button>
                </div>
            </div>
        </div>
    </section>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../JS/employee.js"></script>
    <style>

        .search-section {

        }

        .search-group {

        }
        
        .form-group select {

        }
        
        .search-input-wrapper {

        .search-input-wrapper input {

            color: #333;

        .add-material-btn {
            background-color: #4caf50;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .add-material-btn:hover {
            background-color: #45a049;
        }
        
        .add-quantity-btn {

        /* 模态框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 10000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.4);

        }

        .table-container {
            overflow-x: auto;
        }
        
        .material-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
        }
        
        .material-table th,
        .material-table td {
            padding: 12px;

            border-bottom: 1px solid #e0e0e0;

            background-color: #f5f5f5;

            justify-content: center;

            background-color: #fff;

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 显示欢迎信息
            function showWelcomeMessage() {
                var username = localStorage.getItem('username') || '仓库管理员';
                $('#welcomeTitle').text('欢迎回来，' + username + '！');
            }
            
            showWelcomeMessage();
            
            // 加载物料数据
            loadMaterialData();
            
            // 搜索按钮点击事件
            $('.search-btn').click(function() {
                var category = $('#materialCategory').val();
                var searchValue = $('#materialSearch').val().trim();
                var status = $('#materialStatus').val();
                
                console.log('搜索参数:', { category, searchValue, status });
                
                if (category) {
                    // 如果选择了类别，调用类别搜索API
                    searchMaterialsByCategory(category, status);
                } else if (searchValue) {
                    // 如果搜索框有值，调用名称搜索API
                    searchMaterialsByType(searchValue, status);
                } else {
                    // 如果都为空，加载所有物料
                    loadMaterialData(status);
                }
            });
            
            // 回车键搜索
            $('#materialSearch').keypress(function(e) {
                if (e.which === 13) {
                    $('.search-btn').click();
                }
            });
            

            
            // 重置按钮点击事件
            $('.reset-btn').click(function() {
                $('#materialCategory').val('');
                $('#materialStatus').val('in-stock');
                $('#materialSearch').val('');
                loadMaterialData('in-stock');
            });
            
            // 添加物料按钮点击事件
            $('.add-material-btn').click(function() {
                // 显示添加物料模态框
                showAddMaterialModal();
            });
            
            // 显示添加物料模态框
            function showAddMaterialModal() {
                // 创建模态框HTML
                var modalHtml = `
                    <div id="addMaterialModal" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3>添加新物料</h3>
                                <span class="close">&times;</span>
                            </div>
                            <div class="modal-body">
                                <div class="form-group">
                                    <label for="modalMaterialType">物料名称：</label>
                                    <input type="text" id="modalMaterialType" placeholder="请输入物料名称">
                                </div>
                                <div class="form-group">
                                    <label for="modalQuantity">物料数量：</label>
                                    <input type="text" id="modalQuantity" placeholder="请输入物料数量">
                                </div>
                                <div class="form-group">
                                    <label for="modalPrice">物料价格：</label>
                                    <input type="text" id="modalPrice" placeholder="请输入物料价格">
                                </div>
                                <div class="form-group">
                                    <label for="modalCategory">类别：</label>
                                    <select id="modalCategory">
                                        <option value="">请选择类别</option>
                                        <option value="1">音响设备</option>
                                        <option value="2">舞台桁架</option>
                                        <option value="3">舞台配套</option>
                                        <option value="4">庆典道具</option>
                                        <option value="5">灯光设备</option>
                                        <option value="6">桌椅布艺</option>
                                        <option value="7">展示防护</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="modalRemarks">备注：</label>
                                    <textarea id="modalRemarks" placeholder="请输入备注" rows="3"></textarea>
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button id="cancelAddMaterialBtn">取消</button>
                                <button id="confirmAddMaterialBtn">确定</button>
                            </div>
                        </div>
                    </div>
                `;
                
                // 添加到页面
                $('body').append(modalHtml);
                
                // 显示模态框
                $('#addMaterialModal').show();
                
                // 关闭模态框
                $('.close, #cancelAddMaterialBtn').click(function() {
                    $('#addMaterialModal').remove();
                });
                
                // 点击模态框外部关闭
                $(window).click(function(event) {
                    var modal = $('#addMaterialModal');
                    if (event.target == modal[0]) {
                        modal.remove();
                    }
                });
                
                // 确认按钮点击事件
                $('#confirmAddMaterialBtn').click(function() {
                    var materialType = $('#modalMaterialType').val().trim();
                    var quantity = $('#modalQuantity').val().trim();
                    var price = $('#modalPrice').val().trim();
                    var category = $('#modalCategory').val();
                    var remarks = $('#modalRemarks').val().trim();
                    
                    // 验证必需参数
                    if (!materialType) {
                        alert('请输入物料名称');
                        return;
                    }
                    if (!quantity) {
                        alert('请输入物料数量');
                        return;
                    }
                    if (!price) {
                        alert('请输入物料价格');
                        return;
                    }
                    
                    // 调用API添加物料
                    addMaterial(materialType, quantity, price, remarks, category);
                    $('#addMaterialModal').remove();
                });
            }
            
            // 添加物料
            function addMaterial(materialType, quantity, price, remarks, category) {
                $.ajax({
                    url: 'http://localhost:8080/EventPlanning_Management/AddMaterial',
                    type: 'GET',
                    data: {
                        materialType: materialType,
                        quantity: quantity,
                        price: price,
                        remarks: remarks,
                        category: category
                    },
                    dataType: 'json',
                    success: function(response) {
                        if (response.flag === 'success') {
                            alert('物料添加成功');
                            // 重新加载物料数据
                            loadMaterialData();
                        } else {
                            alert('添加失败：' + (response.data || '未知错误'));
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('添加物料失败:', error);
                        alert('添加物料失败，请稍后重试');
                    }
                });
            }
            
            // 添加数量按钮点击事件
            $(document).on('click', '.add-quantity-btn', function() {
                var materialId = $(this).data('id');
                var currentQuantity = $(this).closest('tr').find('td:nth-child(3)').text().trim();
                
                // 显示添加数量模态框
                showAddQuantityModal(materialId, currentQuantity);
            });
            
            // 显示添加数量模态框
            function showAddQuantityModal(materialId, currentQuantity) {
                // 创建模态框HTML
                var modalHtml = `
                    <div id="addQuantityModal" class="modal">
                        <div class="modal-content">
                            <div class="modal-header">
                                <h3>更新物料数量</h3>
                                <span class="close">&times;</span>
                            </div>
                            <div class="modal-body">
                                <input type="hidden" id="modalMaterialId" value="${materialId}">
                                <div class="form-group">
                                    <label for="modalQuantity">当前数量：</label>
                                    <span>${currentQuantity}</span>
                                </div>
                                <div class="form-group">
                                    <label for="modalQuantity">新数量：</label>
                                    <input type="text" id="modalQuantity" placeholder="请输入新的物料数量">
                                </div>
                            </div>
                            <div class="modal-footer">
                                <button id="cancelAddQuantityBtn">取消</button>
                                <button id="confirmAddQuantityBtn">确定</button>
                            </div>
                        </div>
                    </div>
                `;
                
                // 添加到页面
                $('body').append(modalHtml);
                
                // 显示模态框
                $('#addQuantityModal').show();
                
                // 关闭模态框
                $('.close, #cancelAddQuantityBtn').click(function() {
                    $('#addQuantityModal').remove();
                });
                

                
                // 确认按钮点击事件
                $('#confirmAddQuantityBtn').click(function() {
                    var quantity = $('#modalQuantity').val().trim();
                    if (!quantity) {
                        alert('请输入新的物料数量');
                        return;
                    }
                    
                    // 校验输入值必须是大于0的数字
                    var numQuantity = parseFloat(quantity);
                    if (isNaN(numQuantity) || numQuantity <= 0) {
                        alert('请输入大于0的数字');
                        return;
                    }
                    
                    // 调用API更新物料数量
                    updateMaterialQuantity(materialId, quantity);
                    $('#addQuantityModal').remove();
                });
            }
            
            // 更新物料数量
            function updateMaterialQuantity(materialId, quantity) {
                $.ajax({
                    url: 'http://localhost:8080/EventPlanning_Management/UpdateMaterialQuantity',
                    type: 'GET',
                    data: {
                        materialId: materialId,
                        quantity: quantity
                    },
                    dataType: 'json',
                    success: function(response) {
                        if (response.flag === 'success') {
                            alert('物料数量更新成功');
                            // 重新加载物料数据
                            loadMaterialData();
                        } else {
                            alert('更新失败：' + (response.data || '未知错误'));
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('更新物料数量失败:', error);
                        alert('更新物料数量失败，请稍后重试');
                    }
                });
            }
        });
        
        // 显示欢迎信息
        function showWelcomeMessage() {
            var username = localStorage.getItem('username') || '仓库管理员';
            $('#welcomeTitle').text('欢迎回来，' + username + '！');
        }
        

        
        // 分页相关变量
        var currentPage = 1;
        var pageSize = 10;
        var allMaterials = [];
        
        // 对物料数据按照category和material_id排序
        function sortMaterialsByCategoryAndId(materials) {
            return materials.sort(function(a, b) {
                // 首先按照category排序
                var categoryA = parseInt(a.category || a.Category || a.CATEGORY || 0);
                var categoryB = parseInt(b.category || b.Category || b.CATEGORY || 0);
                
                if (categoryA !== categoryB) {
                    return categoryA - categoryB;
                }
                
                // 如果category相等，则按照material_id排序
                var idA = parseInt(a.material_id || a.materialId || a.MaterialId || 0);
                var idB = parseInt(b.material_id || b.materialId || b.MaterialId || 0);
                return idA - idB;
            });
        }
        
        // 加载物料数据
        function loadMaterialData(status) {
            console.log('加载物料数据，状态:', status);
            var url = 'http://localhost:8080/EventPlanning_Management/GetWarehouseMaterials';
            if (status) {
                url += '?status=' + status;
            }
            
            console.log('请求URL:', url);
            
            $.ajax({
                url: url,
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    console.log('获取物料数据成功:', response);
                    if (response.flag === 'success') {
                        console.log('原始物料数据:', response.data);
                        
                        // 为每个物料获取出库信息

        // 获取当前页数据
        function getCurrentPageData() {
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            return allMaterials.slice(start, end);
        }
        
        // 渲染分页控件
        function renderPagination() {
            const totalPages = Math.ceil(allMaterials.length / pageSize);
            const pagination = $('.pagination');
            pagination.empty();
            
            // 上一页按钮
            const prevBtn = $('<button class="page-btn">上一页</button>');
            prevBtn.click(function() {
                if (currentPage > 1) {
                    currentPage--;
                    renderPagination();
                    renderMaterialTable(getCurrentPageData());
                }
            });
            pagination.append(prevBtn);
            
            // 页码按钮
            for (let i = 1; i <= totalPages; i++) {
                const pageBtn = $('<button class="page-btn">' + i + '</button>');
                if (i === currentPage) {
                    pageBtn.addClass('active');
                }
                pageBtn.click(function() {
                    currentPage = i;
                    renderPagination();
                    renderMaterialTable(getCurrentPageData());
                });
                pagination.append(pageBtn);
            }
            
            // 下一页按钮
            const nextBtn = $('<button class="page-btn">下一页</button>');
            nextBtn.click(function() {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderPagination();
                    renderMaterialTable(getCurrentPageData());
                }
            });
            pagination.append(nextBtn);
        }
        
        // 根据类别代码获取类别名称
        function getCategoryName(categoryCode) {
            const categoryMap = {
                '1': '音响设备',
                '2': '舞台桁架',
                '3': '舞台配套',
                '4': '庆典道具',
                '5': '灯光设备',
                '6': '桌椅布艺',
                '7': '展示防护'
            };
            return categoryMap[categoryCode] || '-';
        }
        
        // 渲染物料表格
        function renderMaterialTable(materials) {
            var tbody = $('#materialTableBody');
            tbody.empty();
            
            if (materials && materials.length > 0) {
                materials.forEach(function(item) {
                    // 确保正确获取category字段，处理可能的字段名差异
                    var categoryCode = item.category || item.Category || item.CATEGORY || '';
                    var categoryName = getCategoryName(categoryCode);
                    var materialName = item.material_type || item.materialType || item.MaterialType || '-';
                    var quantity = item.quantity || '-';
                    var price = item.price || '-';
                    var remarks = item.remarks || '-';
                    var materialId = item.material_id || item.materialId || item.MaterialId || '';
                    var status = item.status || '未出库';
                    
                    // 根据状态显示不同的操作按钮
                    var operationButton;
                    if (status === '已出库') {
                        operationButton = '<button class="view-outbound-btn" data-id="' + materialId + '">查看</button>';
                    } else {
                        operationButton = '<button class="add-quantity-btn" data-id="' + materialId + '">添加</button>';
                    }
                    
                    var row = '<tr>' +
                        '<td data-tooltip="' + categoryName + '">' + categoryName + '</td>' +
                        '<td data-tooltip="' + materialName + '">' + materialName + '</td>' +
                        '<td data-tooltip="' + quantity + '">' + quantity + '</td>' +
                        '<td data-tooltip="' + price + '">' + price + '</td>' +
                        '<td data-tooltip="' + remarks + '">' + remarks + '</td>' +
                        '<td>' + operationButton + '</td>' +
                        '</tr>';

                    tbody.append(row);
                });
            } else {
                tbody.append('<tr><td colspan="6" style="text-align: center;">暂无物料数据</td></tr>');
            }
        }

        // 显示出库详情模态框

            // 创建模态框HTML

                    <div class="modal-content">
                        <div class="modal-header">

                                </div>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button id="closeOutboundDetailBtn">关闭</button>
                        </div>
                    </div>
                </div>
            `;
            
            // 添加模态框到页面
            $('body').append(modalHtml);
            
            // 绑定关闭按钮点击事件
            $('.close, #closeOutboundDetailBtn').click(function() {
                $('#outboundDetailModal').remove();
            });
            
            // 点击模态框外部关闭模态框
            $(window).click(function(event) {
                var modal = $('#outboundDetailModal');
                if (event.target == modal[0]) {
                    modal.remove();
                }
            });
            
            // 获取出库详情
            getOutboundDetail(materialId);
        }
        
        // 获取出库详情
        function getOutboundDetail(materialId) {
            // 这里需要先获取物料的出库记录ID
            // 假设我们有一个API来获取物料的出库记录
            $.ajax({
                url: 'http://localhost:8080/EventPlanning_Management/GetMaterialOutboundInfo',
                type: 'GET',
                data: {
                    materialId: materialId
                },
                dataType: 'json',
                success: function(response) {
                    if (response.flag === 'success') {
                        // 假设response.data中有outbound_id字段
                        var outboundId = response.data.outbound_id || 0;
                        if (outboundId) {
                            // 调用GetOutboundDetailById API获取出库详情
                            $.ajax({
                                url: 'http://localhost:8080/EventPlanning_Management/GetOutboundDetailById',
                                type: 'GET',
                                data: {
                                    outboundId: outboundId
                                },
                                dataType: 'json',
                                success: function(detailResponse) {
                                    if (detailResponse.flag === 'success') {
                                        renderOutboundDetail(detailResponse.data);
                                    } else {
                                        $('#outboundDetailContent').html('<p style="color: red; text-align: center;">获取出库详情失败</p>');
                                    }
                                },
                                error: function(xhr, status, error) {
                                    console.error('获取出库详情失败:', error);
                                    $('#outboundDetailContent').html('<p style="color: red; text-align: center;">获取出库详情失败，请稍后重试</p>');
                                }
                            });
                        } else {
                            $('#outboundDetailContent').html('<p style="color: red; text-align: center;">未找到出库记录</p>');
                        }
                    } else {
                        $('#outboundDetailContent').html('<p style="color: red; text-align: center;">获取物料出库信息失败</p>');
                    }
                },
                error: function(xhr, status, error) {
                    console.error('获取物料出库信息失败:', error);
                    $('#outboundDetailContent').html('<p style="color: red; text-align: center;">获取物料出库信息失败，请稍后重试</p>');
                }
            });
        }
