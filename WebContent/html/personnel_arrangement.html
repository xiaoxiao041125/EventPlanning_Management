                        <label for="startDate">起始时间：</label>
                        <input type="date" id="startDate">
                    </div>
                    
                    <div class="filter-group">

                    </div>
                    
                    <div class="filter-group">
                        <label for="cityFilter">城市：</label>

                            <option value="">全部城市</option>
                            <option value="武汉">武汉</option>
                            <option value="南京">南京</option>
                            <option value="杭州">杭州</option>
                            <option value="苏州">苏州</option>
                            <option value="北京">北京</option>
                            <option value="广州">广州</option>
                            <option value="深圳">深圳</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="searchInput">搜索：</label>

                            </tr>

                            </tr>
                        </tbody>
                    </table>

    <script src="../JS/jquery-3.4.1.min.js"></script>

    <script>
        $(function() {
            // 切换用户版按钮
            $("#switchToUserBtn").click(function() {
                $("body").addClass("fade-out");
                setTimeout(function() {
                    window.location.href = "index.html";
                }, 300);
            });
            
            // 分页相关变量
            var currentPage = 1;
            var pageSize = 10;
            var totalWorkers = [];
            var filteredWorkers = [];
            
            // 页面加载时获取所有工人
            getAllWorkers();
            
            // 起始时间筛选
            $("#startDate").change(function() {
                currentPage = 1;
                getAllWorkers();
            });
            
            // 终止时间筛选
            $("#endDate").change(function() {
                currentPage = 1;
                getAllWorkers();
            });
            
            // 城市筛选
            $("#cityFilter").change(function() {
                currentPage = 1;
                getAllWorkers();
            });
            
            // 搜索功能
            $("#searchInput").on("input", function() {
                currentPage = 1;
                getAllWorkers();
            });
            
            // 搜索按钮点击事件
            $("#searchBtn").click(function() {
                currentPage = 1;
                getAllWorkers();
            });
            
            // 清空按钮点击事件
            $("#resetBtn").click(function() {
                // 清空所有搜索条件
                $("#startDate").val('');
                $("#endDate").val('');
                $("#cityFilter").val('');
                $("#searchInput").val('');
                
                // 重新加载数据
                currentPage = 1;
                getAllWorkers();
            });
            
            // 分页按钮点击事件
            $(document).on("click", ".page-btn", function() {
                if($(this).is(":disabled")) return;
                
                var text = $(this).text();
                
                if(text === "上一页") {
                    if(currentPage > 1) {
                        currentPage--;
                        renderPagination();
                    }
                } else if(text === "下一页") {
                    if(currentPage < Math.ceil(filteredWorkers.length / pageSize)) {
                        currentPage++;
                        renderPagination();
                    }
                } else {
                    currentPage = parseInt(text);
                    renderPagination();
                }
            });
            
            // 获取所有工人
            function getAllWorkers() {
                // 调用SearchEmployeeCombined API获取工人数据
                var startDate = $("#startDate").val();
                var endDate = $("#endDate").val();
                var city = $("#cityFilter").val();
                var keyword = $("#searchInput").val().trim();
                
                // 构建API参数
                var params = {};
                
                if(startDate) {
                    params.startTime = startDate + ' 00:00:00';
                }
                
                if(endDate) {
                    params.endTime = endDate + ' 23:59:59';
                }
                
                if(city) {
                    params.city = city;
                }
                
                if(keyword) {
                    params.keyword = keyword;
                }
                
                $.ajax({
                    url: "http://localhost:8080/EventPlanning_Management/SearchEmployeeCombined",
                    type: "GET",
                    data: params,
                    dataType: "json",
                    success: function(result) {
                        if(result.flag === "success" && result.data && result.data.length > 0) {
                            // 使用API返回的工人数据
                            totalWorkers = result.data;
                            
                            // 为每个工人添加默认状态字段
                            totalWorkers.forEach(function(worker) {
                                // 默认状态：1为可安排（空闲）
                                worker.status = worker.status || 1;
                            });
                            
                            filterWorkers();
                        } else {
                            // 如果SearchEmployeeCombined API返回空数据，使用ShowEmployeeWork API作为备选
                            $.ajax({
                                url: "http://localhost:8080/EventPlanning_Management/ShowEmployeeWork",
                                type: "GET",
                                dataType: "json",
                                success: function(backupResult) {
                                    if(backupResult.flag === "success" && backupResult.data && backupResult.data.length > 0) {
                                        // 使用API返回的工人数据，包含状态信息
                                        totalWorkers = backupResult.data;
                                        
                                        filterWorkers();
                                    } else {
                                        // 如果ShowEmployeeWork API也返回空数据，使用ShowEmployee API作为备选
                                        $.ajax({
                                            url: "http://localhost:8080/EventPlanning_Management/ShowEmployee",
                                            type: "GET",
                                            dataType: "json",
                                            success: function(finalBackupResult) {
                                                if(finalBackupResult.flag === "success") {
                                                    // 筛选出职位为工人的员工
                                                    totalWorkers = finalBackupResult.data.filter(function(employee) {
                                                        return employee.post === "工人";
                                                    });
                                                    
                                                    // 为每个工人添加默认状态字段
                                                    totalWorkers.forEach(function(worker) {
                                                        // 默认状态：1为可安排（空闲）
                                                        worker.status = worker.status || 1;
                                                    });
                                                    
                                                    filterWorkers();
                                                } else {
                                                    alert("获取员工列表失败：" + finalBackupResult.msg);
                                                }
                                            },
                                            error: function() {
                                                alert("获取员工列表失败，请检查网络连接");
                                            }
                                        });
                                    }
                                },
                                error: function() {
                                    // 如果ShowEmployeeWork API调用失败，使用ShowEmployee API作为备选
                                    $.ajax({
                                        url: "http://localhost:8080/EventPlanning_Management/ShowEmployee",
                                        type: "GET",
                                        dataType: "json",
                                        success: function(finalBackupResult) {
                                            if(finalBackupResult.flag === "success") {
                                                // 筛选出职位为工人的员工
                                                totalWorkers = finalBackupResult.data.filter(function(employee) {
                                                    return employee.post === "工人";
                                                });
                                                
                                                // 为每个工人添加默认状态字段
                                                totalWorkers.forEach(function(worker) {
                                                    // 默认状态：1为可安排
                                                    worker.status = worker.status || 1;
                                                });
                                                
                                                filterWorkers();
                                            } else {
                                                alert("获取员工列表失败：" + finalBackupResult.msg);
                                            }
                                        },
                                        error: function() {
                                            alert("获取员工列表失败，请检查网络连接");
                                        }
                                    });
                                }
                            });
                        }
                    },
                    error: function() {
                        // 如果SearchEmployeeCombined API调用失败，使用ShowEmployeeWork API作为备选
                        $.ajax({
                            url: "http://localhost:8080/EventPlanning_Management/ShowEmployeeWork",
                            type: "GET",
                            dataType: "json",
                            success: function(backupResult) {
                                if(backupResult.flag === "success" && backupResult.data && backupResult.data.length > 0) {
                                    // 使用API返回的工人数据，包含状态信息
                                    totalWorkers = backupResult.data;
                                    
                                    filterWorkers();
                                } else {
                                    // 如果ShowEmployeeWork API也返回空数据，使用ShowEmployee API作为备选
                                    $.ajax({
                                        url: "http://localhost:8080/EventPlanning_Management/ShowEmployee",
                                        type: "GET",
                                        dataType: "json",
                                        success: function(finalBackupResult) {
                                            if(finalBackupResult.flag === "success") {
                                                // 筛选出职位为工人的员工
                                                totalWorkers = finalBackupResult.data.filter(function(employee) {
                                                    return employee.post === "工人";
                                                });
                                                
                                                // 为每个工人添加默认状态字段
                                                totalWorkers.forEach(function(worker) {
                                                    // 默认状态：1为可安排
                                                    worker.status = worker.status || 1;
                                                });
                                                
                                                filterWorkers();
                                            } else {
                                                alert("获取员工列表失败：" + finalBackupResult.msg);
                                            }
                                        },
                                        error: function() {
                                            alert("获取员工列表失败，请检查网络连接");
                                        }
                                    });
                                }
                            },
                            error: function() {
                                // 如果ShowEmployeeWork API调用失败，使用ShowEmployee API作为备选
                                $.ajax({
                                    url: "http://localhost:8080/EventPlanning_Management/ShowEmployee",
                                    type: "GET",
                                    dataType: "json",
                                    success: function(finalBackupResult) {
                                        if(finalBackupResult.flag === "success") {
                                            // 筛选出职位为工人的员工
                                            totalWorkers = finalBackupResult.data.filter(function(employee) {
                                                return employee.post === "工人";
                                            });
                                            
                                            // 为每个工人添加默认状态字段
                                            totalWorkers.forEach(function(worker) {
                                                // 默认状态：1为可安排
                                                worker.status = worker.status || 1;
                                            });
                                            
                                            filterWorkers();
                                        } else {
                                            alert("获取员工列表失败：" + finalBackupResult.msg);
                                        }
                                    },
                                    error: function() {
                                        alert("获取员工列表失败，请检查网络连接");
                                    }
                                });
                            }
                        });
                    }
                });
            }
            
            // 过滤工人
            function filterWorkers() {
                // 直接使用totalWorkers，因为API已经返回了过滤后的数据
                filteredWorkers = totalWorkers;
                
                currentPage = 1;
                renderPagination();
            }
            
            // 渲染分页
            function renderPagination() {
                var totalPages = Math.ceil(filteredWorkers.length / pageSize);
                var startPage = Math.max(1, currentPage - 2);
                var endPage = Math.min(totalPages, startPage + 4);
                
                // 渲染工人列表
                var startIndex = (currentPage - 1) * pageSize;
                var endIndex = startIndex + pageSize;
                var pageWorkers = filteredWorkers.slice(startIndex, endIndex);
                renderWorkers(pageWorkers);
                
                // 更新分页信息
                updatePagination(filteredWorkers.length, totalPages, startPage, endPage);
            }
            
            // 渲染工人列表
            function renderWorkers(workers) {
                var tbody = $("#workerTable tbody");
                tbody.empty();
                
                if(workers.length === 0) {
                    tbody.append("<tr><td colspan='8' style='text-align: center; color: #999;'>暂无工人数据</td></tr>");
                    return;
                }
                
                $.each(workers, function(index, worker) {
                    var statusNum = parseInt(worker.status);
                    var statusText = statusNum === 1 ? "可安排" : "忙碌";
                    var statusClass = statusNum === 1 ? "status-available" : "status-busy";
                    var arrangeBtnDisabled = "";
                    var city = worker.city || worker.city_name || worker.location || "-";
                    var userId = worker.userid || worker.userId || worker.id || "-";
                    
                    var row = "<tr>" +
                        "<td>" + worker.employee_id + "</td>" +
                        "<td>" + userId + "</td>" +
                        "<td>" + worker.name + "</td>" +
                        "<td>" + worker.sex + "</td>" +
                        "<td>" + city + "</td>" +
                        "<td>" + worker.phone + "</td>" +
                        "<td class='" + statusClass + "'>" + statusText + "</td>" +
                        "<td><button class='arrange-btn' " + arrangeBtnDisabled + " data-id='" + worker.employee_id + "' data-userid='" + userId + "' data-name='" + worker.name + "'>安排</button></td>" +
                        "</tr>";
                    tbody.append(row);
                });
                
                // 绑定安排按钮事件
                bindArrangeEvents();
            }
            
            // 绑定安排按钮事件
            function bindArrangeEvents() {
                $(".arrange-btn").click(function() {
                    var workerId = $(this).data("id");
                    var userId = $(this).data("userid");
                    var workerName = $(this).data("name");
                    
                    // 设置表单数据
                    $("#taskWorker").val(workerName + " (ID: " + workerId + ")");
                    $("#taskForm").data("worker-id", workerId);
                    $("#taskForm").data("user-id", userId);
                    
                    // 重置活动选择下拉框
                    $("#taskActivity").html('<option value="">请选择活动</option>');
                    
                    // 显示模态框
                    $("#taskModal").show();
                });
            }
            
            // 绑定活动选择下拉框点击事件
            $("#taskActivity").click(function() {
                var $select = $(this);
                
                // 如果下拉框已经有选项（除了默认选项），则不再加载
                if ($select.find('option').length > 1) {
                    return;
                }
                
                // 显示加载状态
                $select.html('<option value="">加载中...</option>');
                
                // 调用API获取活动列表
                $.ajax({
                    url: "http://localhost:8080/EventPlanning_Management/ShowAllActivityDemand",
                    type: "GET",
                    dataType: "json",
                    success: function(result) {
                        console.log('API返回结果:', result);
                        if(result.flag === "success" && result.data && result.data.length > 0) {
                            // 筛选出活动进度 >= 2的活动
                            var eligibleActivities = result.data.filter(function(activity) {
                                console.log('活动数据:', activity);
                                var progress = parseInt(activity.activity_progress || activity.status || 0);
                                return progress >= 2;
                            });
                            
                            console.log('符合条件的活动:', eligibleActivities);
                            // 更新下拉框选项
                            var options = '<option value="">请选择活动</option>';
                            eligibleActivities.forEach(function(activity) {
                                console.log('处理活动数据:', activity);
                                var activityId = activity.demand_id || activity.id || activity.demandId;
                                var activityPlace = activity.activity_place || activity.place || '';
                                var activityType = activity.activity_type || activity.type || '';
                                var activityName = (activityPlace + activityType) || '活动 ' + activityId;
                                console.log('生成活动选项:', activityId, activityName);
                                options += '<option value="' + activityId + '" data-name="' + activityName + '">' + activityName + '</option>';
                            });
                            console.log('生成的下拉框选项:', options);
                            $select.html(options);
                        } else {
                            // 没有符合条件的活动
                            $select.html('<option value="">暂无符合条件的活动</option>');
                        }
                    },
                    error: function(xhr, status, error) {
                        // API调用失败
                        console.error('API调用失败:', status, error);
                        $select.html('<option value="">加载活动失败</option>');
                    }
                });
            });
            
            // 更新分页信息
            function updatePagination(totalWorkers, totalPages, startPage, endPage) {
                var pagination = $(".pagination");
                pagination.empty();
                
                // 上一页按钮
                var prevBtn = $("<button class='page-btn'>上一页</button>");
                if(currentPage === 1) {
                    prevBtn.prop("disabled", true);
                }
                pagination.append(prevBtn);
                
                // 页码按钮
                for(var i = startPage; i <= endPage; i++) {
                    var pageBtn = $("<button class='page-btn'>" + i + "</button>");
                    if(i === currentPage) {
                        pageBtn.addClass("active");
                    }
                    pagination.append(pageBtn);
                }
                
                // 下一页按钮
                var nextBtn = $("<button class='page-btn'>下一页</button>");
                if(currentPage === totalPages || totalPages === 0) {
                    nextBtn.prop("disabled", true);
                }
                pagination.append(nextBtn);
                
                // 分页信息
                var pageInfo = $("<span class='page-info'>共 " + totalWorkers + " 条记录，每页 " + pageSize + " 条，共 " + totalPages + " 页</span>");
                pagination.append(pageInfo);
            }
            
            // 关闭任务模态框
            $("#taskModalClose").click(function() {
                $("#taskModal").hide();
                $("#taskForm")[0].reset();
            });
            
            $("#taskModalCancel").click(function() {
                $("#taskModal").hide();
                $("#taskForm")[0].reset();
            });
            
            // 点击模态框外部关闭
            $(window).click(function(event) {
                if (event.target == $("#taskModal")[0]) {
                    $("#taskModal").hide();
                    $("#taskForm")[0].reset();
                }
            });
            
            // 任务表单提交
            $("#taskForm").submit(function(e) {
                e.preventDefault();
                
                var workerId = $(this).data("worker-id");
                var userId = $(this).data("user-id");
                var activityId = $("#taskActivity").val();
                var startTime = $("#taskStartTime").val();
                var endTime = $("#taskEndTime").val();
                
                // 验证表单
                if(!activityId) {
                    alert("请选择活动");
                    return;
                }
                
                if(!startTime || !endTime) {
                    alert("请选择任务时间");
                    return;
                }
                
                if(new Date(startTime) >= new Date(endTime)) {
                    alert("开始时间必须早于结束时间");
                    return;
                }
                
                if(!userId || userId === "-") {
                    alert("无法获取员工的用户ID，请刷新页面后重试");
                    return;
                }
                
                if(confirm("确定要安排此任务吗？")) {
                    // 调用安排任务API
                    var apiUrl = "http://localhost:8080/EventPlanning_Management/UpdateEmployeeWorkStatus";
                    var params = {
                        userId: userId,
                        workStartTime: startTime.replace('T', ' '),
                        workEndTime: endTime.replace('T', ' '),
                        demandId: activityId
                    };
                    
                    console.log('提交的参数:', params);
                    console.log('API请求URL:', apiUrl);
                    
                    $.ajax({
                        url: apiUrl,
                        type: "GET",
                        data: params,
                        dataType: "json",
                        success: function(result) {
                            console.log('API返回结果:', result);
                            if(result.flag === "success") {
                                alert("任务安排成功！");
                                
                                // 更新工人状态为忙碌
                                totalWorkers.forEach(function(worker) {
                                    if(worker.employee_id == workerId) {
                                        worker.status = 0;
                                    }
                                });
                                
                                // 重新渲染
                                filterWorkers();
                                
                                // 关闭模态框
                                $("#taskModal").hide();
                                $("#taskForm")[0].reset();
                            } else {
                                console.log('任务安排失败，返回结果:', result);
                                // 使用result.data或result.msg作为错误信息
                                var errorMsg = result.data || result.msg || "未知错误";
                                alert("任务安排失败：" + errorMsg);
                            }
                        },
                        error: function(xhr, status, error) {
                            console.error('API调用失败:', status, error);
                            console.error('响应状态:', xhr.status);
                            console.error('响应文本:', xhr.responseText);
                            alert("任务安排失败，请检查网络连接");
                        }
                    });
                }
            });
            
            // 退出登录
            $("#headerLoginBtn").click(function() {
                if(confirm('确定要退出登录吗？')) {
                    window.location.href = 'login.html';
                }
            });
            
            // 切换到用户版
            $("#switchToUserBtn").click(function() {
                $(".navbar").addClass("fade-out");
                setTimeout(function() {
                    window.location.href = "index.html";
                }, 300);
            });
        })
    </script>
    <script src="../JS/index.js"></script>
</body>
</html>
