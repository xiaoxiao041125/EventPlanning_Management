    <script>
        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            // 加载待处理申请数据
            loadApplications('pending');
            
            // 选项卡切换功能
            const tabBtns = document.querySelectorAll('.tab-btn');
            const tabContents = document.querySelectorAll('.tab-content');
            
            tabBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const targetTab = this.getAttribute('data-tab');
                    
                    // 移除所有按钮的active类
                    tabBtns.forEach(btn => btn.classList.remove('active'));
                    // 添加当前按钮的active类
                    this.classList.add('active');
                    
                    // 隐藏所有内容
                    tabContents.forEach(content => content.classList.remove('active'));
                    // 显示当前内容
                    const targetContent = document.getElementById(targetTab);
                    if (targetContent) {
                        targetContent.classList.add('active');
                        // 加载对应状态的申请数据
                        loadApplications(targetTab);
                    }
                });
            });
            
            // 关闭详情弹窗
            document.getElementById('detailModalClose').addEventListener('click', function() {
                document.getElementById('applicationDetailModal').style.display = 'none';
            });
            
            document.getElementById('detailModalCancel').addEventListener('click', function() {
                document.getElementById('applicationDetailModal').style.display = 'none';
            });
            
            // 点击弹窗外部关闭
            window.addEventListener('click', function(event) {
                const modal = document.getElementById('applicationDetailModal');
                if (event.target == modal) {
                    modal.style.display = 'none';
                }
            });
        });
        
        // 加载活动申请数据
        function loadApplications(status) {
            $.ajax({
                url: 'http://localhost:8080/EventPlanning_Management/ShowAllActivityDemand',
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response.flag === 'success') {
                        const applications = response.data;
                        renderApplications(applications, status);
                    } else {
                        const container = document.querySelector(`#${status} .list-container`);
                        container.innerHTML = '<div class="no-data">' + (response.data || '获取数据失败') + '</div>';
                    }
                },
                error: function(xhr, status, error) {
                    const container = document.querySelector(`#${status} .list-container`);
                    container.innerHTML = '<div class="no-data">请求失败，请检查网络连接</div>';
                }
            });
        }
        
        // 渲染活动申请列表
        function renderApplications(applications, status) {
            const container = document.querySelector(`#${status} .list-container`);
            container.innerHTML = '';
            
            if (!applications || applications.length === 0) {
                container.innerHTML = '<div class="no-data">没有找到活动申请记录</div>';
                return;
            }
            
            // 获取当前用户职位
            const userPost = localStorage.getItem('post') || '';
            
            // 过滤申请数据
            let filteredApplications = applications;
            if (status !== 'all') {
                filteredApplications = applications.filter(app => {
                    const progress = Number(app.activity_progress) || 0;
                    
                    if (status === 'pending') {
                        // 业务管理员：状态为0时视为待处理
                        // 仓库管理员：状态为1时视为待处理
                        if (userPost === '业务管理员') {
                            return progress === 0;
                        } else if (userPost === '仓库管理员') {
                            return progress === 1;
                        } else {
                            return progress === 0 || progress === '待处理';
                        }
                    }
                    
                    if (status === 'approved') {
                        // 业务管理员：状态大于0时视为已批准
                        // 仓库管理员：状态大于1时视为已处理
                        if (userPost === '业务管理员') {
                            return progress > 0;
                        } else if (userPost === '仓库管理员') {
                            return progress > 1;
                        } else {
                            return progress > 0 || progress === '已批准';
                        }
                    }
                    
                    if (status === 'rejected') {
                        // 所有职位：状态小于0时视为已拒绝
                        return progress < 0;
                    }
                    
                    return true;
                });
            }
            
            // 渲染申请列表
            if (filteredApplications.length === 0) {
                container.innerHTML = '<div class="no-data">没有找到符合条件的活动申请记录</div>';
                return;
            }
            
            filteredApplications.forEach(app => {
                const applicationItem = createApplicationItem(app);
                container.appendChild(applicationItem);
            });
        }
        
        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                '-3': '用户已取消',
                '-2': '仓库管理员拒绝',
                '-1': '业务管理员拒绝',
                '0': '待处理',
                '1': '业务管理员通过',
                '2': '仓库管理员通过',
                '3': '人员安排完成',
                '待处理': '待处理',
                '已批准': '已批准',
                '已拒绝': '已拒绝'
            };
            const statusStr = String(status);
            return statusMap[statusStr] || statusStr || '未知状态';
        }
        
        // 获取状态类名
        function getStatusClass(status) {
            const statusClassMap = {
                '-3': 'rejected',
                '-2': 'rejected',
                '-1': 'rejected',
                '0': 'pending',
                '1': 'approved',
                '2': 'approved',
                '3': 'approved',
                '待处理': 'pending',
                '已批准': 'approved',
                '已拒绝': 'rejected'
            };
            const statusStr = String(status);
            return statusClassMap[statusStr] || 'pending';
        }
        
        // 创建活动申请项
        function createApplicationItem(app) {
            const item = document.createElement('div');
            item.className = 'application-item';
            
            // 确定状态信息
            const statusText = getStatusText(app.activity_progress);
            const statusClass = getStatusClass(app.activity_progress);
            
            // 获取当前用户职位
            const userPost = localStorage.getItem('post') || '';
            const progress = Number(app.activity_progress) || 0;
            
            // 判断是否显示批准和拒绝按钮，以及显示什么按钮
            let showActionButtons = false;
            let approveButtonText = '';
            let approveButtonAction = '';
            
            if (userPost === '业务管理员') {
                // 业务管理员：状态为0时显示按钮，只显示"同意"
                showActionButtons = progress === 0;
                approveButtonText = '同意';
                approveButtonAction = `approveApplication('${app.demand_id}')`;
            } else if (userPost === '仓库管理员') {
                // 仓库管理员：状态为1时显示按钮，显示"同意并筹备物料"
                showActionButtons = progress === 1;
                approveButtonText = '同意并筹备物料';
                approveButtonAction = `prepareMaterials('${app.demand_id}')`;
            } else {
                // 默认：状态为0时显示按钮
                showActionButtons = progress === 0;
                approveButtonText = '同意';
                approveButtonAction = `approveApplication('${app.demand_id}')`;
            }
            
            item.innerHTML = `
                <div class="application-header">
                    <span class="application-title">${app.activity_type}活动申请</span>
                    <span class="application-status ${statusClass}">${statusText}</span>
                </div>
                <div class="application-info">
                    <div class="info-row">
                        <span class="info-label">申请人：</span>
                        <span class="info-value">${app.user_name || app.name || '未知用户'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">申请日期：</span>
                        <span class="info-value">${new Date().toISOString().split('T')[0]}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">活动时间：</span>
                        <span class="info-value">${app.start_time} 至 ${app.end_time}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">活动地点：</span>
                        <span class="info-value">${app.activity_place}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">活动规模：</span>
                        <span class="info-value">${app.activity_people}人</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">预算金额：</span>
                        <span class="info-value">¥${app.activity_budget}</span>
                    </div>
                </div>
                <div class="application-actions">
                    <button class="view-detail-btn" onclick="viewApplicationDetail('${app.demand_id}')">查看详情</button>
                    ${showActionButtons ? `
                        <button class="approve-btn" onclick="${approveButtonAction}">${approveButtonText}</button>
                        <button class="reject-btn" onclick="rejectApplication('${app.demand_id}')">拒绝</button>
                    ` : ''}
                </div>
            `;
            
            return item;
        }
        
        // 查看活动申请详情
        function viewApplicationDetail(demandId) {
            $.ajax({
                url: 'http://localhost:8080/EventPlanning_Management/ShowActivityDemandById',
                type: 'GET',
                data: { demandId: demandId },
                dataType: 'json',
                success: function(response) {
                    if (response.flag === 'success') {
                        const app = response.data;
                        renderApplicationDetail(app);
                        document.getElementById('applicationDetailModal').style.display = 'block';
                    } else {
                        alert('获取活动申请详情失败: ' + response.data);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('请求失败:', error);
                    alert('获取活动申请详情失败');
                }
            });
        }
        
        // 渲染活动申请详情
        function renderApplicationDetail(app) {
            const modalBody = document.querySelector('#applicationDetailModal .modal-body');
            
            // 确定状态信息
            const statusText = getStatusText(app.activity_progress);
            const statusClass = getStatusClass(app.activity_progress);
            
            modalBody.innerHTML = `
                <div class="detail-section">
                    <h3>基本信息</h3>
                    <div class="detail-info">
                        <div class="detail-row">
                            <span class="detail-label">申请ID：</span>
                            <span class="detail-value">${app.demand_id}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">申请人：</span>
                            <span class="detail-value">${app.user_name || app.name || '未知用户'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">用户名：</span>
                            <span class="detail-value">${app.username || '未知'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">联系电话：</span>
                            <span class="detail-value">${app.phone || '未知'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">性别：</span>
                            <span class="detail-value">${app.sex || '未知'}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">申请日期：</span>
                            <span class="detail-value">${new Date().toISOString().split('T')[0]}</span>
                        </div>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>活动信息</h3>
                    <div class="detail-info">
                        <div class="detail-row">
                            <span class="detail-label">活动名称：</span>
                            <span class="detail-value">${app.activity_type}活动</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">活动类型：</span>
                            <span class="detail-value">${app.activity_type}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">活动时间：</span>
                            <span class="detail-value">${app.start_time} 至 ${app.end_time}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">活动地点：</span>
                            <span class="detail-value">${app.activity_place}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">活动规模：</span>
                            <span class="detail-value">${app.activity_people}人</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-label">预算金额：</span>
                            <span class="detail-value">¥${app.activity_budget}</span>
                        </div>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h3>申请状态</h3>
                    <div class="status-info">
                        <div class="status-row">
                            <span class="status-label">当前状态：</span>
                            <span class="status-value ${statusClass}">${statusText}</span>
                        </div>
                    </div>
                </div>
            `;
            
            // 更新弹窗底部按钮
            const modalFooter = document.querySelector('#applicationDetailModal .modal-footer');
            const progress = String(app.activity_progress);
            const isPending = progress === '待处理' || progress === '0';
            
            if (isPending) {
                modalFooter.innerHTML = `
                    <button type="button" class="modal-btn reject-btn" onclick="rejectApplication('${app.demand_id}')">拒绝</button>
                    <button type="button" class="modal-btn approve-btn" onclick="approveApplication('${app.demand_id}')">批准</button>
                    <button type="button" class="modal-btn register-modal-btn" id="detailModalCancel">关闭</button>
                `;
            } else {
                modalFooter.innerHTML = `
                    <button type="button" class="modal-btn register-modal-btn" id="detailModalCancel">关闭</button>
                `;
            }
            
            // 重新绑定关闭按钮事件
            document.getElementById('detailModalCancel').addEventListener('click', function() {
                document.getElementById('applicationDetailModal').style.display = 'none';
            });
        }
        
        // 全局变量
        let currentDemandId = '';
        
        // 打开物料选择弹窗
        function prepareMaterials(demandId) {
            currentDemandId = demandId;
            loadMaterials();
            document.getElementById('materialSelectionModal').style.display = 'block';
        }
        
        // 加载物料数据
        function loadMaterials() {
            $.ajax({
                url: 'http://localhost:8080/EventPlanning_Management/GetWarehouseMaterials',
                type: 'GET',
                dataType: 'json',
                success: function(response) {
                    if (response.flag === 'success') {
                        renderMaterials(response.data);
                    } else {
                        alert('获取物料数据失败: ' + response.data);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('请求失败:', error);
                    alert('获取物料数据失败');
                }
            });
        }
        
        // 重置搜索
        function resetSearch() {
            document.getElementById('materialSearch').value = '';
            loadMaterials();
        }
        
        // 搜索物料
        function searchMaterials() {
            const searchKeyword = document.getElementById('materialSearch').value;
            if (searchKeyword) {
                $.ajax({
                    url: 'http://localhost:8080/EventPlanning_Management/GetMaterialsByType',
                    type: 'GET',
                    data: { materialType: searchKeyword },
                    dataType: 'json',
                    success: function(response) {
                        if (response.flag === 'success') {
                            renderMaterials(response.data);
                        } else {
                            alert('搜索物料失败: ' + response.data);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('请求失败:', error);
                        alert('搜索物料失败');
                    }
                });
            } else {
                loadMaterials();
            }
        }
        
        // 类别翻译
        function getCategoryName(category) {
            const categoryMap = {
                '1': '音响设备',
                '2': '舞台桁架',
                '3': '舞台配套',
                '4': '庆典道具',
                '5': '灯光设备',
                '6': '桌椅布艺',
                '7': '展示防护'
            };
            return categoryMap[category] || category;
        }
        
        // 排序物料
        function sortMaterials(materials) {
            return materials.sort(function(a, b) {
                // 先按类别排序
                const categoryA = parseInt(a.category || 0);
                const categoryB = parseInt(b.category || 0);
                if (categoryA !== categoryB) {
                    return categoryA - categoryB;
                }
                // 类别相同按物料ID排序
                const idA = parseInt(a.material_id || 0);
                const idB = parseInt(b.material_id || 0);
                return idA - idB;
            });
        }
        
        // 渲染物料列表
        function renderMaterials(materials) {
            // 排序物料
            const sortedMaterials = sortMaterials(materials);
            
            const tableBody = document.getElementById('materialTableBody');
            tableBody.innerHTML = '';
            
            sortedMaterials.forEach(function(material) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><input type="checkbox" class="material-checkbox" data-id="${material.material_id}"></td>
                    <td>${material.material_type}</td>
                    <td>${getCategoryName(material.category)}</td>
                    <td>${material.quantity}</td>
                    <td>${material.price}</td>
                    <td data-tooltip="${material.remarks}">${material.remarks}</td>
                    <td><input type="number" class="quantity-input" data-id="${material.material_id}" min="1" value="1"></td>
                `;
                tableBody.appendChild(row);
            });
        }
        
        // 确认物料选择
        function confirmMaterialSelection() {
            const selectedMaterials = [];
            const checkboxes = document.querySelectorAll('.material-checkbox:checked');
            
            if (checkboxes.length === 0) {
                alert('请至少选择一种物料');
                return;
            }
            
            // 检查物料库存是否足够
            for (let i = 0; i < checkboxes.length; i++) {
                const checkbox = checkboxes[i];
                const materialId = checkbox.dataset.id;
                const quantityInput = document.querySelector(`.quantity-input[data-id="${materialId}"]`);
                const quantity = parseInt(quantityInput.value) || 0;
                
                // 获取现有数量
                const row = checkbox.closest('tr');
                const quantityCell = row.querySelector('td:nth-child(4)');
                const quantityText = quantityCell.textContent;
                const quantityMatch = quantityText.match(/\d+/);
                const currentQuantity = quantityMatch ? parseInt(quantityMatch[0]) : 0;
                
                // 检查库存是否足够
                if (currentQuantity < quantity) {
                    const materialName = row.querySelector('td:nth-child(2)').textContent;
                    alert(`物料 "${materialName}" 库存不足，请重试`);
                    return;
                }
            }
            
            // 收集物料信息
            checkboxes.forEach(function(checkbox) {
                const materialId = checkbox.dataset.id;
                const quantityInput = document.querySelector(`.quantity-input[data-id="${materialId}"]`);
                const quantity = quantityInput.value;
                
                // 获取单价
                const row = checkbox.closest('tr');
                const priceCell = row.querySelector('td:nth-child(5)');
                const priceText = priceCell.textContent;
                
                selectedMaterials.push({
                    materialId: materialId,
                    quantity: quantity,
                    price: priceText
                });
            });
            
            // 处理物料出库和活动状态更新
            processMaterialOutbound(selectedMaterials);
        }
        
        // 处理物料出库
        function processMaterialOutbound(materials) {
            const userPost = localStorage.getItem('post') || '';
            const principalUserId = localStorage.getItem('userId') || '';
            
            // 顺序处理物料出库
            function processNext(index) {
                if (index >= materials.length) {
                    // 所有物料处理完成
                    updateActivityStatus();
                    return;
                }
                
                const material = materials[index];
                
                // 计算物料总价
                const priceText = material.price;
                const priceMatch = priceText.match(/\d+/);
                const price = priceMatch ? parseInt(priceMatch[0]) : 0;
                const quantity = parseInt(material.quantity) || 0;
                const materialTotalPrice = (price * quantity).toString();
                
                $.ajax({
                    url: 'http://localhost:8080/EventPlanning_Management/AddMaterialOutbound',
                    type: 'GET',
                    data: {
                        demandId: currentDemandId,
                        materialId: material.materialId,
                        materialTotalPrice: materialTotalPrice,
                        quantity: material.quantity,
                        userId: principalUserId
                    },
                    dataType: 'json',
                    success: function(response) {
                        if (response.flag === 'success') {
                            // 处理下一个物料
                            processNext(index + 1);
                        } else {
                            alert('物料处理失败: ' + response.data);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('添加物料出库记录失败:', error);
                        alert('物料处理失败: ' + error);
                    }
                });
            }
            
            // 开始处理第一个物料
            processNext(0);
        }
        
        // 更新活动状态
        function updateActivityStatus() {
            const userPost = localStorage.getItem('post') || '';
            const principalUserId = localStorage.getItem('userId') || '';
            let activityProgress = '1'; // 默认值
            
            if (userPost === '业务管理员') {
                activityProgress = '1';
            } else if (userPost === '仓库管理员') {
                activityProgress = '2';
            }
            
            $.ajax({
                url: 'http://localhost:8080/EventPlanning_Management/UpdateActivityProgress',
                type: 'POST',
                data: { 
                    demandId: currentDemandId,
                    activityProgress: activityProgress,
                    principalUserId: principalUserId
                },
                dataType: 'json',
                success: function(response) {
                    if (response.flag === 'success') {
                        alert('同意并筹备物料成功！');
                        // 关闭弹窗
                        document.getElementById('materialSelectionModal').style.display = 'none';
                        // 重新加载当前选项卡的数据
                        const activeTab = document.querySelector('.tab-btn.active').getAttribute('data-tab');
                        loadApplications(activeTab);
                    } else {
                        alert('更新活动状态失败: ' + response.data);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('请求失败:', error);
                    alert('更新活动状态失败');
                }
            });
        }
        
        // 批准活动申请（保留原有功能）
        function approveApplication(demandId) {
            if(confirm('确定要批准该活动申请吗？')) {
                // 获取当前用户职位和ID
                const userPost = localStorage.getItem('post') || '';
                const principalUserId = localStorage.getItem('userId') || '';
                // 根据职位设置不同的活动进度值
                let activityProgress = '1'; // 默认值
                if (userPost === '业务管理员') {
                    activityProgress = '1';
                } else if (userPost === '仓库管理员') {
                    activityProgress = '2';
                }
                
                $.ajax({
                    url: 'http://localhost:8080/EventPlanning_Management/UpdateActivityProgress',
                    type: 'POST',
                    data: { 
                        demandId: demandId,
                        activityProgress: activityProgress,
                        principalUserId: principalUserId
                    },
                    dataType: 'json',
                    success: function(response) {
                        if (response.flag === 'success') {
                            alert('批准成功！');
                            // 重新加载当前选项卡的数据
                            const activeTab = document.querySelector('.tab-btn.active').getAttribute('data-tab');
                            loadApplications(activeTab);
                        } else {
                            alert('批准失败: ' + response.data);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('请求失败:', error);
                        alert('批准失败');
                    }
                });
            }
        }
        
        // 拒绝活动申请
        function rejectApplication(demandId) {
            // 弹出输入框让用户输入拒绝原因
            var refuseReason = prompt('请输入拒绝原因：', '');
            
            // 如果用户点击了取消，就不执行拒绝操作
            if (refuseReason === null) {
                return;
            }
            
            if(confirm('确定要拒绝该活动申请吗？')) {
                // 获取当前用户职位和ID
                const userPost = localStorage.getItem('post') || '';
                const principalUserId = localStorage.getItem('userId') || '';
                // 根据职位设置不同的活动进度值
                let activityProgress = '-1'; // 默认值
                if (userPost === '业务管理员') {
                    activityProgress = '-1';
                } else if (userPost === '仓库管理员') {
                    activityProgress = '-2';
                }
                
                $.ajax({
                    url: 'http://localhost:8080/EventPlanning_Management/UpdateActivityProgress',
                    type: 'POST',
                    data: { 
                        demandId: demandId,
                        activityProgress: activityProgress,
                        refuseReason: refuseReason,
                        principalUserId: principalUserId
                    },
                    dataType: 'json',
                    success: function(response) {
                        if (response.flag === 'success') {
                            alert('拒绝成功！');
                            // 重新加载当前选项卡的数据
                            const activeTab = document.querySelector('.tab-btn.active').getAttribute('data-tab');
                            loadApplications(activeTab);
                        } else {
                            alert('拒绝失败: ' + response.data);
                        }
                    },
                    error: function(xhr, status, error) {
                        console.error('请求失败:', error);
                        alert('拒绝失败');
                    }
                });
            }
        }
        
        // 根据用户ID查看活动申请
        function loadApplicationsByUserId(userId) {
            $.ajax({
                url: 'http://localhost:8080/EventPlanning_Management/ShowActivityDemandByUserId',
                type: 'GET',
                data: { userId: userId },
                dataType: 'json',
                success: function(response) {
                    if (response.flag === 'success') {
                        const applications = response.data;
                        // 这里可以根据需要处理用户的活动申请数据
                        console.log('用户活动申请:', applications);
                    } else {
                        console.error('获取用户活动申请失败:', response.data);
                    }
                },
                error: function(xhr, status, error) {
                    console.error('请求失败:', error);
                }
            });
        }
        

    </script>
    
    <script>
        $(function() {
            $("#switchToUserBtn").click(function() {
                $("body").addClass("fade-out");
                setTimeout(function() {
                    window.location.href = "index.html";
                }, 300);
            });
            
            // 关闭物料选择弹窗
            $("#materialModalClose").click(function() {
                $("#materialSelectionModal").hide();
            });
            
            $("#materialModalCancel").click(function() {
                $("#materialSelectionModal").hide();
            });
            

        });
    </script>
</body>
</html>
