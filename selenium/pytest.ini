[pytest]
# 测试目录
testpaths = tests

# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 添加标记定义
markers =
    smoke: 冒烟测试
    regression: 回归测试
    login: 登录相关测试
    activity: 活动申请相关测试
    material: 物料管理相关测试
    salary: 薪资管理相关测试
    finance: 活动财务相关测试
    slow: 慢速测试

# Allure报告配置
addopts = 
    -v
    --tb=short
    --strict-markers
    --alluredir=reports/allure-results
    --clean-alluredir

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 超时设置（可选）
# timeout = 300
