[pytest]
# 测试文件匹配模式
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 测试目录
testpaths = .

# 命令行默认参数
addopts = 
    -v
    --tb=short
    --strict-markers
    --html=reports/report.html
    --self-contained-html
    --capture=no

# 标记定义
markers =
    smoke: 冒烟测试
    login: 登录相关测试
    activity: 活动申请相关测试
    ui: UI 界面测试
    api: 接口测试
    slow: 慢速测试

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 超时设置（秒）
timeout = 300
